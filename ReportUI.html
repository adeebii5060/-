<!-- ================= หน้าเขียนรายงานเพิ่มเติม ================= -->
<div class="max-w-4xl mx-auto space-y-8 pb-10">
  
  <!-- ส่วนของฟอร์มกรอกข้อมูล -->
  <div class="bg-white rounded-[2.5rem] shadow-xl shadow-indigo-100/50 border border-indigo-50 overflow-hidden animate-up">
    <div class="bg-gradient-to-r from-indigo-500 to-purple-500 p-8 text-white flex items-center">
      <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-2xl mr-5 shadow-inner">
        <i class="fas fa-file-alt"></i>
      </div>
      <div>
        <h2 class="text-2xl font-bold">บันทึกรายงานเพิ่มเติม</h2>
        <p class="text-indigo-100 text-sm opacity-90 font-light">กรอกรายละเอียดสรุปเหตุการณ์ประจำวันหรือกรณีพิเศษ</p>
      </div>
    </div>

    <form id="reportForm" onsubmit="submitReport(event)" class="p-8 space-y-6">
      <!-- 1. หัวข้อ -->
      <div>
        <label class="block text-sm font-bold text-gray-500 mb-2 ml-1 uppercase tracking-wider">1. หัวข้อรายงาน</label>
        <input type="text" id="rep-title" required class="w-full bg-slate-50 border border-gray-200 rounded-2xl px-5 py-4 text-lg font-bold text-gray-700 focus:outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 transition" placeholder="เช่น สรุปการยึดโทรศัพท์หอพัก, บันทึกการเชิญผู้ปกครอง...">
      </div>

      <!-- 2. รายละเอียด -->
      <div>
        <label class="block text-sm font-bold text-gray-500 mb-2 ml-1 uppercase tracking-wider">2. รายละเอียดแผนงาน / เหตุการณ์</label>
        <textarea id="rep-detail" required rows="6" class="w-full bg-slate-50 border border-gray-200 rounded-2xl px-5 py-4 text-gray-700 focus:outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 transition resize-none" placeholder="พิมพ์บรรยายรายละเอียดที่นี่..."></textarea>
      </div>

      <!-- 3. หมายเหตุ -->
      <div>
        <label class="block text-sm font-bold text-gray-500 mb-2 ml-1 uppercase tracking-wider">3. หมายเหตุสรุป</label>
        <input type="text" id="rep-note" class="w-full bg-slate-50 border border-gray-200 rounded-2xl px-5 py-4 text-gray-700 focus:outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 transition" placeholder="หมายเหตุเพิ่มเติม (ถ้ามี)">
      </div>

      <!-- ปุ่มกด -->
      <div class="flex gap-4 pt-4">
        <button type="submit" id="btnReportSave" class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white py-5 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-200 transition transform hover:-translate-y-1">
          <i class="fas fa-paper-plane mr-2"></i> บันทึกรายงานเข้าสู่ระบบ
        </button>
        <button type="button" onclick="document.getElementById('reportForm').reset()" class="px-8 bg-gray-100 hover:bg-gray-200 text-gray-500 rounded-2xl font-bold transition">ล้างข้อมูล</button>
      </div>
    </form>
  </div>

  <!-- ส่วนของประวัติล่าสุด -->
  <div class="bg-white rounded-[2rem] shadow-lg border border-gray-100 overflow-hidden animate-up" style="animation-delay: 0.2s">
    <div class="px-8 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
      <h3 class="font-bold text-gray-700 flex items-center"><i class="fas fa-history mr-2 text-indigo-400"></i> ประวัติการรายงานล่าสุด (10 รายการ)</h3>
      <button onclick="loadRecentReports()" class="text-indigo-500 hover:text-indigo-700 text-sm font-bold"><i class="fas fa-sync-alt mr-1"></i> รีเฟรช</button>
    </div>
    <div class="overflow-x-auto">
      <table class="min-w-full table-auto text-sm">
        <thead class="bg-gray-50 text-gray-400 font-bold uppercase text-[10px] tracking-widest">
          <tr>
            <th class="px-8 py-4 text-left">วัน-เวลา</th>
            <th class="px-8 py-4 text-left">หัวข้อ</th>
            <th class="px-8 py-4 text-left">รายละเอียด</th>
          </tr>
        </thead>
        <tbody id="report-history-body" class="divide-y divide-gray-50">
          <!-- ข้อมูลจะโหลดมาใส่ตรงนี้ -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  function loadRecentReports() {
    const tbody = document.getElementById('report-history-body');
    tbody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-gray-400 animate-pulse">กำลังดึงประวัติล่าสุด...</td></tr>';

    google.script.run.withSuccessHandler(res => {
      if(res.status === 'success') {
        tbody.innerHTML = res.data.length ? '' : '<tr><td colspan="3" class="p-10 text-center text-gray-400">ยังไม่เคยมีการบันทึกรายงาน</td></tr>';
        res.data.forEach(item => {
          tbody.innerHTML += `
            <tr class="hover:bg-indigo-50/20 transition-colors">
              <td class="px-8 py-4 whitespace-nowrap text-gray-400 text-xs font-mono">${item.date}</td>
              <td class="px-8 py-4 font-bold text-indigo-600">${item.title}</td>
              <td class="px-8 py-4 text-gray-500 line-clamp-1">${item.detail.substring(0, 50)}${item.detail.length > 50 ? '...' : ''}</td>
            </tr>
          `;
        });
      }
    }).getRecentReports();
  }

  function submitReport(e) {
    e.preventDefault();
    const btn = document.getElementById('btnReportSave');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>กำลังประมวลผล...';

    const data = {
      title: document.getElementById('rep-title').value,
      detail: document.getElementById('rep-detail').value,
      note: document.getElementById('rep-note').value
    };

    google.script.run.withSuccessHandler(res => {
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> บันทึกรายงานเข้าสู่ระบบ';
      if(res.status === 'success') {
        document.getElementById('reportForm').reset();
        Swal.fire({ title: 'สำเร็จ!', text: 'บันทึกรายงานเพิ่มเติมเรียบร้อยแล้ว', icon: 'success', timer: 2000, showConfirmButton: false });
        loadRecentReports(); // โหลดตารางประวัติด้านล่างใหม่
      } else {
        Swal.fire('Error', res.message, 'error');
      }
    }).saveAdditionalReport(data);
  }
</script>
