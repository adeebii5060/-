<div class="bg-white rounded-3xl shadow-lg shadow-gray-100/50 border border-gray-100 flex flex-col h-full overflow-hidden">
          
  <!-- ส่วนหัว -->
  <div class="p-6 border-b border-gray-100 flex flex-col md:flex-row justify-between items-center bg-white">
    <div class="flex items-center">
      <div class="w-12 h-12 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-500 mr-4 shadow-sm transform hover:rotate-6 transition-transform duration-300">
        <i class="fas fa-clipboard-list text-xl"></i>
      </div>
      <div>
        <h3 class="text-xl font-bold text-gray-800 leading-tight">เกณฑ์คะแนน</h3>
        <p class="text-xs text-gray-400 font-medium">จัดการคะแนน พฤติกรรม / การแต่งกาย</p>
      </div>
    </div>
    <button onclick="openBehaviorForm('add')" class="mt-4 md:mt-0 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white px-5 py-2.5 rounded-xl shadow-lg shadow-indigo-200 hover:shadow-indigo-300 transition-all transform hover:-translate-y-0.5 text-sm font-bold flex items-center group">
      <i class="fas fa-plus mr-2 group-hover:rotate-90 transition-transform"></i>เพิ่มเกณฑ์ใหม่
    </button>
  </div>

  <div id="behavior-loading" class="hidden flex flex-col justify-center items-center py-20">
    <div class="loader mb-3" style="border-top-color: #6366f1; border-color: #e0e7ff;"></div>
    <span class="text-gray-400 font-medium text-sm animate-pulse">กำลังดึงข้อมูล...</span>
  </div>

  <!-- ตาราง -->
  <div class="overflow-x-auto custom-scroll">
    <table class="min-w-full table-auto text-sm">
      <thead class="bg-gray-50/50 text-gray-500 font-semibold border-b border-gray-100">
        <tr>
          <th class="px-6 py-4 text-center w-40">ประเภท/ระดับ</th>
          <th class="px-6 py-4 text-center w-28">รหัส</th>
          <th class="px-6 py-4 text-left">รายละเอียด</th>
          <th class="px-6 py-4 text-center w-32">คะแนน</th>
          <th class="px-6 py-4 text-center w-32">จัดการ</th>
        </tr>
      </thead>
      <tbody id="behavior-table-body" class="divide-y divide-gray-50 bg-white"></tbody>
    </table>
  </div>
</div>

<!-- Modal Form -->
<div id="behavior-form-modal" class="hidden fixed inset-0 bg-gray-900/40 backdrop-blur-md flex justify-center items-center p-4 z-50 transition-opacity">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-8 relative overflow-hidden transform scale-100 transition-transform">
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-400 to-purple-500"></div>

    <div class="flex justify-between items-center mb-6">
      <h3 id="behavior-form-title" class="text-2xl font-bold text-gray-800">เพิ่มเกณฑ์</h3>
      <button onclick="closeBehaviorForm()" class="w-8 h-8 rounded-full bg-gray-100 hover:bg-rose-100 text-gray-400 hover:text-rose-500 flex items-center justify-center transition"><i class="fas fa-times"></i></button>
    </div>
    
    <form id="behavior-form" onsubmit="saveBehavior(event)">
      <input type="hidden" id="bh-form-rowIdx">
      
      <div class="grid grid-cols-2 gap-5 mb-5">
        <div>
          <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">ระดับ/ประเภท</label>
          <select id="bh-form-level" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 transition">
            <option value="0" class="text-green-600 font-bold">0 (ทำความดี - เพิ่มคะแนน)</option>
            <option value="U" class="text-blue-600 font-bold">U (ระเบียบการแต่งกาย)</option>
            <option value="1">1 (พฤติกรรม: เบา)</option>
            <option value="2">2 (พฤติกรรม: ปานกลาง)</option>
            <option value="3">3 (พฤติกรรม: หนัก)</option>
            <option value="4">4 (พฤติกรรม: รุนแรงสุด)</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">รหัสข้อ</label>
          <input type="text" id="bh-form-code" placeholder="เช่น U.1, 1.2" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 transition">
        </div>
      </div>

      <div class="mb-5">
        <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">รายละเอียด (รายการที่เช็ค)</label>
        <textarea id="bh-form-detail" required rows="3" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 resize-none transition" placeholder="เช่น ไม่สวมหมวก, ถุงเท้าผิดระเบียบ"></textarea>
      </div>

      <div class="mb-8">
        <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">คะแนน (ระบุแค่ตัวเลข)</label>
        <input type="number" id="bh-form-points" min="0" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 transition" placeholder="เช่น 5">
        <p class="text-xs text-gray-400 mt-1 ml-1">* หากเป็นแค่การตักเตือน ให้ใส่คะแนนเป็น 0</p>
      </div>

      <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
        <button type="button" onclick="closeBehaviorForm()" class="px-5 py-2.5 rounded-xl text-sm font-bold text-gray-500 hover:bg-gray-100 transition">ยกเลิก</button>
        <button type="submit" id="bh-btn-save" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 transition transform hover:-translate-y-0.5">
          บันทึก
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  let behaviorData = [];

  function loadBehaviorData() {
    const tbody = document.getElementById('behavior-table-body');
    tbody.innerHTML = ''; 
    document.getElementById('behavior-loading').classList.remove('hidden');

    google.script.run.withSuccessHandler(response => {
      document.getElementById('behavior-loading').classList.add('hidden');
      if(response.status === 'success') {
        behaviorData = response.data;
        renderBehaviorTable();
      } else { Swal.fire('ข้อผิดพลาด', response.message, 'error'); }
    }).getBehaviorCriteria();
  }

  function renderBehaviorTable() {
    const tbody = document.getElementById('behavior-table-body');
    tbody.innerHTML = '';
    
    if(behaviorData.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="px-5 py-12 text-center text-gray-400 font-medium">ยังไม่มีข้อมูลเกณฑ์คะแนน</td></tr>`;
      return;
    }

    // เรียงลำดับ: 0 (ดี) -> U (แต่งกาย) -> 1,2,3,4 (พฤติกรรม)
    behaviorData.sort((a, b) => {
      // แปลง level ให้เป็นตัวเลขเพื่อการเปรียบเทียบ (U = 0.5 แทรกกลางระหว่าง 0 กับ 1)
      const getWeight = (lvl) => {
        if(lvl == '0') return 0;
        if(lvl == 'U') return 0.5;
        return parseFloat(lvl) || 99; // ถ้าไม่ใช่ตัวเลขให้ไปท้ายสุด
      };
      
      const weightA = getWeight(a.level);
      const weightB = getWeight(b.level);

      if (weightA !== weightB) return weightA - weightB;
      // ถ้า level เท่ากัน ให้เรียงตาม code (แบบตัวเลข)
      return a.code.toString().localeCompare(b.code.toString(), undefined, {numeric: true});
    });

    behaviorData.forEach((item, index) => {
      let levelBadge = '';
      let pointsDisplay = '';
      
      const badgeBase = "inline-block whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold shadow-sm border";

      // --- Logic การแสดงผล ---
      if(item.level == '0') {
        // ระดับ 0: สีเขียว (Positive)
        levelBadge = `<span class="${badgeBase} bg-emerald-100 text-emerald-600 border-emerald-200"><i class="fas fa-check-circle mr-1"></i>ทำความดี</span>`;
        pointsDisplay = `<span class="text-emerald-500 font-bold">+${item.points}</span>`;
      } 
      else if(item.level == 'U') {
        // ระดับ U: สีฟ้า (Uniform)
        levelBadge = `<span class="${badgeBase} bg-sky-100 text-sky-600 border-sky-200"><i class="fas fa-tshirt mr-1"></i>การแต่งกาย</span>`;
        // แต่งกาย เป็นการหักคะแนน (สีแดง หรือ ส้ม)
        pointsDisplay = `<span class="text-rose-500 font-bold">-${item.points}</span>`;
      }
      else {
        // ระดับ 1-4: สีตามความรุนแรง
        pointsDisplay = `<span class="text-rose-500 font-bold">-${item.points}</span>`;
        
        if(item.level == '1') levelBadge = `<span class="${badgeBase} bg-teal-100 text-teal-600 border-teal-200">ระดับ 1</span>`;
        else if(item.level == '2') levelBadge = `<span class="${badgeBase} bg-yellow-100 text-yellow-600 border-yellow-200">ระดับ 2</span>`;
        else if(item.level == '3') levelBadge = `<span class="${badgeBase} bg-orange-100 text-orange-600 border-orange-200">ระดับ 3</span>`;
        else if(item.level == '4') levelBadge = `<span class="${badgeBase} bg-rose-100 text-rose-600 border-rose-200">ระดับ 4</span>`;
      }

      tbody.innerHTML += `
        <tr class="hover:bg-indigo-50/30 transition-colors group">
          <td class="px-6 py-4 text-center align-middle">${levelBadge}</td>
          <td class="px-6 py-4 text-center font-bold text-gray-700 font-mono align-middle">${item.code}</td>
          <td class="px-6 py-4 text-gray-600 font-medium align-middle leading-relaxed">${item.detail}</td>
          <td class="px-6 py-4 text-center align-middle text-base">${pointsDisplay}</td>
          <td class="px-6 py-4 text-center opacity-0 group-hover:opacity-100 transition-opacity align-middle">
            <button onclick="openBehaviorForm('edit', ${index})" class="w-8 h-8 rounded-full bg-indigo-50 text-indigo-500 hover:bg-indigo-500 hover:text-white transition mr-2"><i class="fas fa-edit"></i></button>
            <button onclick="deleteBehaviorRow(${item.rowIdx})" class="w-8 h-8 rounded-full bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white transition"><i class="fas fa-trash"></i></button>
          </td>
        </tr>
      `;
    });
  }

  function openBehaviorForm(mode, index = -1) {
    document.getElementById('behavior-form-modal').classList.remove('hidden');
    if(mode === 'add') {
      document.getElementById('behavior-form-title').innerText = 'เพิ่มเกณฑ์';
      document.getElementById('behavior-form').reset();
      document.getElementById('bh-form-rowIdx').value = '';
    } else {
      document.getElementById('behavior-form-title').innerText = 'แก้ไขเกณฑ์';
      const item = behaviorData[index];
      document.getElementById('bh-form-rowIdx').value = item.rowIdx;
      document.getElementById('bh-form-level').value = item.level;
      document.getElementById('bh-form-code').value = item.code;
      document.getElementById('bh-form-detail').value = item.detail;
      document.getElementById('bh-form-points').value = item.points;
    }
  }

  function closeBehaviorForm() { document.getElementById('behavior-form-modal').classList.add('hidden'); }

  function saveBehavior(e) {
    e.preventDefault();
    const btn = document.getElementById('bh-btn-save');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    
    const data = {
      rowIdx: document.getElementById('bh-form-rowIdx').value,
      level: document.getElementById('bh-form-level').value,
      code: document.getElementById('bh-form-code').value,
      detail: document.getElementById('bh-form-detail').value,
      points: document.getElementById('bh-form-points').value
    };
    
    const serverFunc = data.rowIdx ? 'updateBehavior' : 'addBehavior';
    
    google.script.run.withSuccessHandler(res => {
      btn.disabled = false; btn.innerText = 'บันทึก';
      if(res.status === 'success') {
        closeBehaviorForm(); 
        Swal.fire({ title: 'เรียบร้อย!', icon: 'success', timer: 1500, showConfirmButton: false });
        loadBehaviorData();
      } else { Swal.fire('Ops!', res.message, 'error'); }
    })[serverFunc](data);
  }

  function deleteBehaviorRow(rowIdx) {
    Swal.fire({
      title: 'ลบเกณฑ์นี้?', text: "แน่ใจนะ?", icon: 'warning',
      showCancelButton: true, confirmButtonColor: '#f43f5e', cancelButtonColor: '#cbd5e1',
      confirmButtonText: 'ลบเลย', cancelButtonText: 'ยกเลิก',
    }).then((result) => {
      if (result.isConfirmed) {
        google.script.run.withSuccessHandler(res => {
          if(res.status === 'success') {
            Swal.fire({ title: 'ลบแล้ว!', icon: 'success', timer: 1000, showConfirmButton: false });
            loadBehaviorData();
          }
        }).deleteBehavior(rowIdx);
      }
    })
  }
</script>
